<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios seletores</title>
</head>
<body>
    <link rel="stylesheet" href="assets/css/style-exercicios-seletores.css">
    <script src="assets/js/exercicios-01-seletores.js"></script>
<div>
    <label for="numero1">Primeiro Número</label>
    <input type="number" id="numero1">
    <label for="numero2">Segundo Número</label>
    <input type="number" id="numero2">
    <button onclick="exercicio01CompararDoisNumeros()">Comparar Números</button>
</div>
<div>
    <label for="nome">Nome</label>
    <input type="text" id="nome">
    <label for="idade">Idade</label>
    <input type="number" id="idade">
    <button onclick="exercicio02ClassificarIdade()">Executar</button>
</div>
<div>
    <label for="nota1">Primeira nota</label>
    <input type="number" id="nota1">
    <label for="nota2">Segunda nota</label>
    <input type="number" id="nota2">
    <label for="nota3">Terceira nota</label>
    <input type="number" id="nota3">
    <button onclick="exercicio03ClacularMediaEscolar()">Calcular média</button>
    <label for="media">Média final</label>
    <textarea id="media" disabled readonly></textarea>
</div>
<br>
<div>
    <label for="produto">Produto</label>
    <input type="text" id="produto">
    <label for="preco">Preço do produto</label>
    <input type="number" id="preco">
    <label for="desconto">Desconto</label>
    <select id="desconto">
        <option selected disabled>Selecione uma promoção</option>
        <option value="10%">10%</option>
        <option value="20%">20%</option>
        <option value="30%">30%</option>
    </select>
    <button onclick="exercicio04CalcularDescontoProduto()">Executar</button>
    <textarea id="resultado" disabled readonly></textarea>
</div>
    
</body>
</html>
